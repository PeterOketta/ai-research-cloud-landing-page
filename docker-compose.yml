services:
  narc-frontend:
    image: ${FRONTEND_IMAGE}
    container_name: narc-frontend
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      - LETSENCRYPT_HOST=${VIRTUAL_HOST}
      - VIRTUAL_PORT=80
    expose:
      - "80"
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: proxy_hostinger-network
