            - generic [ref=e108]:
              - heading "Our Mission" [level=4] [ref=e109]
              - paragraph [ref=e110]: To pioneer a national AI-driven healthcare platform that enhances disease screening, enables healthcare data sovereignty, and drives AI research and innovation. Through collaborations across academia, healthcare, and government, we aim to accelerate the development and adoption of AI solutions, ensuring Uganda’s leadership in the Fourth Industrial Revolution (4IR) for health.
          - generic [ref=e112]:
            - img [ref=e115]
            - generic [ref=e118]:
              - heading "Our Vision" [level=4] [ref=e119]
              - paragraph [ref=e120]: To transform healthcare in Uganda through the power of Artificial Intelligence, enabling accessible, early, and accurate disease screening while fostering an innovation-driven AI ecosystem for long-term health and economic impact.
        - generic [ref=e122]:
          - generic [ref=e123]:
            - img [ref=e127]
            - heading "Our Goals" [level=2] [ref=e130]
          - generic [ref=e131]:
            - paragraph [ref=e134]: Develop an Integrated AI Disease Screening Platform Focused on diseases with high public health impact—such as COVID-19, tuberculosis, cervical, and breast cancers—our AI platform utilizes cutting-edge models to improve screening accuracy and accessibility, especially in remote areas. Collaborating with partners like Mulago Hospital and the Uganda Cancer Institute, we develop AI models tailored to meet Uganda’s unique healthcare needs, enhancing diagnostic capabilities and patient outcomes.
            - paragraph [ref=e137]:
              - text: AI in Healthcare Research & Innovation Hub
              - text: We are establishing an AI in Healthcare Research and Innovation Hub to serve as a National Centre for mentorship, technical support, and infrastructure, promoting AI-driven health research and commercialization. The hub will offer a collaborative environment where AI talent can thrive, fostering innovations that address real-world healthcare challenges and build a foundation for long-term AI expertise in Uganda.
            - paragraph [ref=e140]:
              - text: Commercializing AI-Driven Health Innovations
              - text: A core goal of our project is to walk at least three AI-powered healthcare solutions through the full commercialization process, transforming them from research prototypes into sustainable businesses. By supporting product refinement, market readiness, and business development, we aim to establish a thriving ecosystem for AI-driven healthcare solutions that can contribute to Uganda’s economy while delivering accessible, impactful health interventions.
